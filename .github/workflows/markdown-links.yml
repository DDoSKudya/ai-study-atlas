name: Check Markdown Links

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml "**/*.md"
          fail: true
