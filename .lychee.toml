# Lychee configuration for markdown link checking.
# Keeps CI stable for documentation-heavy repositories.

verbose = true
no_progress = true
retry_wait_time = 2
max_retries = 2
timeout = 20
accept = [200, 429]
include_mail = false

# Ignore local anchors and repository-internal relative links.
exclude = [
  "^#",
  "^\\./",
  "^\\.\\./",
]
